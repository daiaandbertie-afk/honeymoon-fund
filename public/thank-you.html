<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Daia & Bertie's Honeymoon Fund</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #F7FAF5 0%, #F2F6EF 30%, #FBF5F4 60%, #F7FAF5 100%);
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      color: #2C3E2D;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 480px;
      padding: 56px 36px;
      background: rgba(255,255,255,0.72);
      border-radius: 16px;
      border: 1px solid rgba(91,123,94,0.07);
      box-shadow: 0 4px 24px rgba(60,80,60,0.06);
    }
    .thanks {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 36px;
      font-weight: 300;
      font-style: italic;
      color: #5B7B5E;
      margin-bottom: 8px;
    }
    .name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 24px;
      font-weight: 500;
      color: #2C3E2D;
      margin-bottom: 20px;
    }
    .message {
      font-size: 15px;
      line-height: 1.7;
      color: #6B8A6E;
      margin-bottom: 28px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin: 24px 0;
    }
    .divider span { width: 36px; height: 1px; background: rgba(91,123,94,0.2); }
    .divider svg { flex-shrink: 0; }
    .sign-off {
      font-size: 15px;
      color: #6B8A6E;
      line-height: 1.7;
    }
    .sign-off em {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 20px;
      font-style: italic;
      color: #3D5A40;
    }
    .back {
      display: inline-block;
      margin-top: 28px;
      font-size: 13px;
      font-weight: 500;
      color: #C4908B;
      text-decoration: none;
      border-bottom: 1px solid rgba(196,144,139,0.4);
      padding-bottom: 2px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="thanks">Thank you</p>
    <p class="name" id="guestName"></p>
    <p class="message">
      Your generous contribution means more than you know.
      It's going straight toward our adventure in the Julian Alps —
      and we'll be thinking of you while we're there.
    </p>
    <div class="divider">
      <span></span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 0.5C7 0.5 8.5 4.5 7 7C5.5 4.5 7 0.5 7 0.5Z" fill="#C4908B" opacity="0.5"/><path d="M7 13.5C7 13.5 8.5 9.5 7 7C5.5 9.5 7 13.5 7 13.5Z" fill="#5B7B5E" opacity="0.4"/><path d="M0.5 7C0.5 7 4.5 5.5 7 7C4.5 8.5 0.5 7 0.5 7Z" fill="#5B7B5E" opacity="0.4"/><path d="M13.5 7C13.5 7 9.5 5.5 7 7C9.5 8.5 13.5 7 13.5 7Z" fill="#C4908B" opacity="0.5"/></svg>
      <span></span>
    </div>
    <p class="sign-off">
      With love and gratitude,<br />
      <em>D & B</em>
    </p>
    <a class="back" href="/">Back to the honeymoon fund</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    const el = document.getElementById('guestName');
    el.textContent = name ? decodeURIComponent(name) : 'Friend';
  </script>
</body>
</html>
